services:
  louder:
    build:
      context: .
      target: dev
    image: louder-dev
    ports:
      - "23294:23294"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      LOUDER_HOST: "0.0.0.0"
      LOUDER_PORT: "23294"
      LOUDER_CONFIG: "${LOUDER_CONFIG:-/app/guards.yaml}"
      LOUDER_OPENAI_URL_1: "${LOUDER_OPENAI_URL_1:-}"
      LOUDER_OPENAI_KEY_1: "${LOUDER_OPENAI_KEY_1:-}"
      LOUDER_ANTHROPIC_URL_1: "${LOUDER_ANTHROPIC_URL_1:-}"
      LOUDER_ANTHROPIC_KEY_1: "${LOUDER_ANTHROPIC_KEY_1:-}"
      UV_PROJECT_ENVIRONMENT: /tmp/venv
    volumes:
      # Bind-mount overrides the image's COPY content — intentional for hot-reload in dev.
      # The production image uses only COPY'd files; this mount is NOT present in production.
      - .:/app
      - /app/.venv
    # Override command to enable hot-reloading for development
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "23294", "--reload", "--reload-dir", "/app"]

  ui:
    build:
      context: .
      target: dev
    image: louder-ui-dev
    ports:
      - "4400:4400"
    environment:
      UV_PROJECT_ENVIRONMENT: /tmp/venv
    volumes:
      - .:/app
      - /app/.venv
    # bun install runs on every start; it is fast when node_modules is up-to-date (no-op install).
    # Moving this to a build step would require rebuilding the image on every dependency change.
    command: ["sh", "-c", "cd /app/public && bun install && bun run dev --host 0.0.0.0 --port 4400"]
