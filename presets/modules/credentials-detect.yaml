# Detects and logs credential material without blocking or modifying requests.
#
# Use for audit pipelines, monitoring, or staging environments where you want
# visibility into credential exposure without disrupting the conversation flow.
# For hard rejection, use credentials-block.yaml. To redact in-place, use
# credentials-sanitize.yaml instead.
#
# Action: log → records detection in audit logs, no blocking or modification
# Engine: detect-secrets library — covers 12 credential families:
#         aws_key, github_token, gitlab_token, jwt, slack_token, private_key,
#         openai_key, stripe_key, twilio_key, discord_token, npm_token, azure_storage_key
guards:
  - match: {}
    apply:
      - type: credential_filter
        config:
          action: log
