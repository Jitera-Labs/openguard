# Redacts live credential material from all messages and output stream.
#
# Use in pipelines where rejecting the whole request is too disruptive — the
# credential value is replaced with a placeholder while the conversation continues.
# For hard rejection, use credentials-block.yaml instead.
#
# Action: redact → replaces credentials with <protected:TYPE> placeholders
# Engine: detect-secrets library (12 credential families) + supplemental pattern
#         matching for HuggingFace, PyPI, and Anthropic keys not in detect-secrets
# Ref:    OWASP LLM07:2025, MITRE ATLAS AML.T0051.000
guards:
  - match: {}
    apply:
      - type: credential_filter
        config:
          action: redact
      - type: keyword_filter
        config:
          keywords:
            - 'hf_[A-Za-z0-9]{30,}'
            - 'pypi-[A-Za-z0-9_-]{60,}'
            - 'sk-ant-[A-Za-z0-9_-]{20,}'
          use_regex: true
          match_mode: any
          action: sanitize
          replacement: '[CREDENTIAL REDACTED]'
