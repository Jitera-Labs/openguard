# Hard-blocks requests/responses containing live credential material.
#
# Use when credentials must NEVER transit the proxy — coding agents, CI pipelines,
# high-security deployments. For pipelines where context preservation matters
# more than hard rejection, use credentials-sanitize.yaml instead.
#
# Action: block → HTTP 403
# Engine: detect-secrets library (12 credential families) + supplemental pattern
#         matching for HuggingFace, PyPI, and Anthropic keys not in detect-secrets
# Ref:    OWASP LLM07:2025, MITRE ATLAS AML.T0051.000
guards:
  - match: {}
    apply:
      - type: credential_filter
        config:
          action: block
      - type: keyword_filter
        config:
          keywords:
            - 'hf_[A-Za-z0-9]{30,}'
            - 'pypi-[A-Za-z0-9_-]{60,}'
            - 'sk-ant-[A-Za-z0-9_-]{20,}'
          use_regex: true
          match_mode: any
          action: block
